name: develop

on:
  pull_request:
    branches: ["develop"]
  push:
    branches: ["develop"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docker_build_scan_push:
    name: Docker Build + Trivy Image Scan + Push to GHCR
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set lowercase image name
        id: image
        run: echo "image=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        shell: bash
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.image }}"
          SHA_TAG="sha-${{ steps.vars.outputs.short_sha }}"

          echo "tags=${IMAGE}:develop,${IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "scan_ref=${IMAGE}:${SHA_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ steps.tags.outputs.scan_ref }}
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: 1

      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
