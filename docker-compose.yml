services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "9000:80"
      - "9443:443"
    environment:
      - NODE_ENV=production
    networks:
      - appointment-net
    volumes:
      - ./certs/frontend.crt:/etc/nginx/certs/frontend.crt:ro
      - ./certs/frontend.key:/etc/nginx/certs/frontend.key:ro

networks:
  appointment-net:
    external: true
